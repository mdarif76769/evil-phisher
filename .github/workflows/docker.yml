name: 'Build & Push Docker Image'

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  CI: true
  DOCKER_BUILDKIT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # ইমেজের নাম অবশ্যই ছোট হাতের অক্ষরে হতে হবে
          docker build --tag mdarif76769/evil-phisher:latest .
          docker tag mdarif76769/evil-phisher:latest ghcr.io/mdarif76769/evil-phisher:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Images
        if: github.repository == 'mdarif76769/evil-phisher'
        run: |
          docker push mdarif76769/evil-phisher:latest
          docker push ghcr.io/mdarif76769/evil-phisher:latest
