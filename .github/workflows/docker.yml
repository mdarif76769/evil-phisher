name: 'Build & Push Docker Image'

on:
  schedule:
    - cron: "0 0 * * 0" # প্রতি রবিবার রান করবে
  workflow_dispatch: # ম্যানুয়াল রান করার অপশন

env:
  CI: true
  DOCKER_BUILDKIT: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 20 ওয়ার্নিং ফিক্স করার জন্য

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # পুল রিকোয়েস্ট ও ফাইল রাইট পারমিশন
      packages: write # GHCR এ পুশ করার জন্য জরুরি

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build --tag mdarif76769/evil-phisher:latest .
          docker tag mdarif76769/evil-phisher:latest ghcr.io/mdarif76769/evil-phisher:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Images
        run: |
          docker push mdarif76769/evil-phisher:latest
          docker push ghcr.io/mdarif76769/evil-phisher:latest
